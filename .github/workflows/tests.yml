name: tests

on:
  push:
    branches: [master]
    paths:
      - '**.php'
      - 'phpunit.xml.dist'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [master]
    paths:
      - '**.php'
      - 'phpunit.xml.dist'
      - '.github/workflows/tests.yml'

jobs:
    run-tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: [8.5, 8.4, 8.3, 8.2]

        name: P${{ matrix.php }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none

            - name: Install dependencies
              uses: "ramsey/composer-install@v3"

            - name: Execute tests
              run: composer test
