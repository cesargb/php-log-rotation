name: phpstan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  phpstan:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.5
        tools: phpstan

    - name: Run analyse phpstan
      run: phpstan analyse --error-format github
